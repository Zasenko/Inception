services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    # secrets:
    #   - db_root_password
    #   - db_password
    env_file:
      - .env
    networks:
      - inception
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}", "--silent"]
      interval: 5s
      retries: 10
      timeout: 5s
  
  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - wp_data:/var/www/html
    env_file:
      - .env
    networks:
      - inception
    healthcheck:
      test: ["CMD", "bash", "-c", "mysql -h $WP_HOST -P $WP_PORT -u $MYSQL_USER -p$MYSQL_PASSWORD $MYSQL_DATABASE -e 'SHOW TABLES LIKE \"wp_options\";' | grep wp_options >/dev/null"]
      interval: 5s
      retries: 10
      timeout: 5s
      start_period: 10s

  nginx:
    build:
      context: ./requirements/nginx
    container_name: nginx
    depends_on:
      wordpress:
        condition: service_healthy
    ports:
      - "443:443"
    env_file:
      - .env
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    restart: unless-stopped
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "https://localhost" ]
    #   interval: 10s
    #   retries: 10
    #   timeout: 5s
    #   start_period: 15s

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none 
      o: bind
      device: /home/${USER}/data/mariadb
  wp_data:
    driver: local
    driver_opts:
      type: none 
      o: bind
      device: /home/${USER}/data/wordpress

# secrets:
#   db_root_password:
#     file: ../secrets/db_root_password.txt
#   db_password:
#     file: ../secrets/db_password.txt

networks:
  inception:
    name: inception_network
    driver: bridge
